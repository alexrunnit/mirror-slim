<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mirror</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: Georgia, serif;
            max-width: 640px;
            margin: 60px auto;
            padding: 0 20px;
            background: #faf9f7;
            color: #2c2c2c;
        }
        h1 {
            font-size: 1.4rem;
            font-weight: normal;
            margin-bottom: 40px;
            color: #555;
        }
        input[type="email"] {
            width: 100%;
            padding: 12px 16px;
            font-family: Georgia, serif;
            font-size: 1rem;
            border: 1px solid #ddd;
            background: #fff;
            box-sizing: border-box;
            margin-bottom: 12px;
        }
        textarea {
            width: 100%;
            height: 300px;
            border: 1px solid #ddd;
            padding: 16px;
            font-family: Georgia, serif;
            font-size: 1rem;
            line-height: 1.7;
            background: #fff;
            resize: vertical;
            box-sizing: border-box;
        }
        button {
            margin-top: 16px;
            padding: 10px 24px;
            background: #2c2c2c;
            color: #fff;
            border: none;
            font-size: 0.9rem;
            cursor: pointer;
        }
        #reflection {
            margin-top: 40px;
            line-height: 1.8;
            color: #444;
        }
        #status {
            margin-top: 16px;
            color: #666;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <h1>Mirror</h1>

    <div id="login-screen">
        <p style="color:#666; margin-bottom:24px;">Enter your email to sign in.</p>
        <input type="email" id="email" placeholder="your@email.com" />
        <button onclick="sendMagicLink()">Send Magic Link</button>
        <div id="status"></div>
    </div>

  <div id="writing-screen" style="display:none;">

<p style="font-size:1.1rem; font-weight:600; color:#888; letter-spacing:0.05em; margin-bottom:24px; text-transform:uppercase;">Reflection Loop</p>

        <!-- Mood tracker -->
        <div id="mood-section" style="margin-bottom:32px;">
            <p style="color:#888; font-size:0.85rem; margin-bottom:12px; letter-spacing:0.05em;">MOOD</p>
            <div id="mood-buttons" style="display:flex; gap:8px; flex-wrap:wrap;">
            </div>
            <div id="mood-status" style="margin-top:8px; font-size:0.85rem; color:#888;"></div>
        </div>

        <!-- Feelings tracker -->
        <div id="feelings-section" style="margin-bottom:32px;">

            <div id="feelings-grid" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:8px; margin-bottom:16px;">
            </div>
            <textarea id="feelings-note" placeholder="Say more if you want to..." style="height:80px; font-size:0.9rem;"></textarea>

        </div>

        <hr style="border:none; border-top:1px solid #eee; margin-bottom:32px;">

        <!-- Writing surface -->
        <button onclick="generatePrompt()" id="prompt-btn" style="background:#f5f5f0; color:#555; border: 1px solid #ddd; margin-bottom:16px;">Generate Prompt</button>

<div id="reflection"></div>

        <!-- Inspiration Gallery -->

         <p style="color:#888; font-size:0.85rem; margin-bottom:12px; letter-spacing:0.05em;">INSPIRATIONS</p>

            <button onclick="captureInspiration()" id="inspire-btn" style="background:#f5f5f0; color:#555; border:1px solid #ddd;">Capture</button>

<!-- Field Notes -->

            <button onclick="captureFieldNote()" id="fieldnote-btn" style="background:#f5f5f0; color:#555; border:1px solid #ddd;">Capture</button>

        async function sendMagicLink() {
            const email = document.getElementById('email').value;
            if (!email.trim()) return;

            document.getElementById('status').innerText = 'Sending...';

            const { error } = await supabaseClient.auth.signInWithOtp({

            if (error) {
                document.getElementById('status').innerText = 'Error: ' + error.message;

let currentRowId = null;
        let promptWasUsed = false;
        let selectedMood = null;
        let selectedFeelings = [];

        // Mood color system
        const moodColors = {
            1: '#e8e8e8', 2: '#c8d4dc', 3: '#a8bfcf',
            4: '#7ea8c4', 5: '#5490b8', 6: '#3a78aa',
            7: '#2560a0', 8: '#1a4d8c', 9: '#0f3875', 10: '#08235e'
        };

        const feelingsList = {
            difficult: [
                'Anxious', 'Overwhelmed', 'Sad', 'Lonely', 'Frustrated',
                'Irritable', 'Numb', 'Fearful', 'Ashamed', 'Disconnected',
                'Restless', 'Heavy'
            ],
            neutral: [
                'Uncertain', 'Contemplative', 'Tired', 'Distracted',
                'Flat', 'Cautious', 'Waiting'
            ],
            expansive: [
                'Calm', 'Grateful', 'Hopeful', 'Curious', 'Confident',
                'Energized', 'Proud', 'Connected', 'Peaceful', 'Inspired',
                'Clear', 'Joyful'
            ]

        // Build mood buttons
        function buildMoodButtons() {
            const container = document.getElementById('mood-buttons');
            for (let i = 1; i <= 10; i++) {
                const btn = document.createElement('button');
                btn.innerText = i;
                btn.style.width = '40px';
                btn.style.height = '40px';
                btn.style.background = moodColors[i];
                btn.style.color = '#fff';
                btn.style.border = 'none';
                btn.style.cursor = 'pointer';
                btn.style.opacity = '0.5';
                btn.style.marginTop = '0';
                btn.style.padding = '0';
                btn.onclick = () => selectMood(i);
                btn.id = `mood-${i}`;
                container.appendChild(btn);
            }
        }

async function buildMoodPostButtons() {
            const container = document.getElementById('mood-post-buttons');
            container.innerHTML = '';
            for (let i = 1; i <= 10; i++) {
                const btn = document.createElement('button');
                btn.innerText = i;
                btn.style.width = '40px';
                btn.style.height = '40px';
                btn.style.background = moodColors[i];
                btn.style.color = '#fff';
                btn.style.border = 'none';
                btn.style.cursor = 'pointer';
                btn.style.opacity = '0.5';
                btn.style.marginTop = '0';
                btn.style.padding = '0';
                btn.onclick = () => logMoodPost(i);
                container.appendChild(btn);
            }
        }

        async function logMoodPost(score) {
            if (!currentRowId) {
                document.getElementById('mood-post-status').innerText = 'No session to update.';
                return;
            }

            const buttons = document.getElementById('mood-post-buttons').children;
            for (let i = 0; i < buttons.length; i++) {
                buttons[i].style.opacity = (i + 1) === score ? '1' : '0.3';
            }

            document.getElementById('mood-post-status').innerText = 'Saving...';

            const { error } = await supabaseClient
                .from('entries')
                .update({ mood_post: score })
                .eq('id', currentRowId);


            if (error) {
                document.getElementById('mood-post-status').innerText = 'Error saving.';
            } else {
                document.getElementById('mood-post-status').innerText = `Post-session mood ${score} logged.`;
                currentRowId = null;
            }
        }

        async function selectMood(score) {
            selectedMood = score;

            // Update button visuals
            for (let i = 1; i <= 10; i++) {
                document.getElementById(`mood-${i}`).style.opacity = i === score ? '1' : '0.3';
            }

            document.getElementById('mood-status').innerText = 'Saving...';

            const { data: { user } } = await supabaseClient.auth.getUser();

            const { error } = await supabaseClient
                .from('mood')
                .insert([{ score: score, user_id: user.id }]);

            if (error) {
                document.getElementById('mood-status').innerText = 'Error saving mood.';
            } else {
                document.getElementById('mood-status').innerText = `Mood ${score} logged.`;
            }
        }

        // Build feelings grid
        function buildFeelingsGrid() {
            const grid = document.getElementById('feelings-grid');
            grid.style.gridTemplateColumns = 'repeat(3, 1fr)';
            grid.style.alignItems = 'start';

            const columns = [
                { key: 'difficult', label: 'Challenging' },
                { key: 'neutral', label: 'Neutral' },
                { key: 'expansive', label: 'Expansive' }
            ];

            columns.forEach(col => {
                const column = document.createElement('div');

                const header = document.createElement('p');
                header.innerText = col.label;
                header.style.fontSize = '0.75rem';
                header.style.color = '#aaa';
                header.style.letterSpacing = '0.05em';
                header.style.marginBottom = '8px';
                header.style.marginTop = '0';
                column.appendChild(header);

                feelingsList[col.key].forEach(feeling => {
                    const label = document.createElement('label');
                    label.style.display = 'flex';
                    label.style.alignItems = 'center';
                    label.style.gap = '6px';
                    label.style.fontSize = '0.9rem';
                    label.style.cursor = 'pointer';
                    label.style.color = '#555';
                    label.style.marginBottom = '6px';

                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.value = feeling;
                    checkbox.onchange = () => {
                        if (checkbox.checked) {
                            selectedFeelings.push(feeling);
                        } else {
                            selectedFeelings = selectedFeelings.filter(f => f !== feeling);
                        }
                    };

                    label.appendChild(checkbox);
                    label.appendChild(document.createTextNode(feeling));
                    column.appendChild(label);
                });

                grid.appendChild(column);
            });
        }

        async function saveFeelings() {
            if (selectedFeelings.length === 0) {
                document.getElementById('feelings-status').innerText = 'Select at least one feeling.';
                return;
            }

            const btn = document.getElementById('feelings-btn');
            if (btn.disabled) return;
            btn.disabled = true;

            document.getElementById('feelings-status').innerText = 'Saving...';
            const { data: { user } } = await supabaseClient.auth.getUser();
            const note = document.getElementById('feelings-note').value;

            const rows = selectedFeelings.map(feeling => ({
                feeling: feeling,
                note: note || null,
                user_id: user.id
            }));

            const { error } = await supabaseClient
                .from('feelings')
                .insert(rows);

            if (error) {
                document.getElementById('feelings-status').innerText = 'Error saving feelings.';
            } else {
                document.getElementById('feelings-status').innerText = `${selectedFeelings.length} feeling${selectedFeelings.length > 1 ? 's' : ''} logged.`;
            }
            btn.disabled = false;
        }

        async function captureInspiration() {
            const content = document.getElementById('inspiration-content').value;
            if (!content.trim()) {
                document.getElementById('inspiration-status').innerText = 'Write something first.';
                return;
            }

            const btn = document.getElementById('inspire-btn');
            if (btn.disabled) return;
            btn.disabled = true;

            document.getElementById('inspiration-status').innerText = 'Capturing...';

            const { data: { user } } = await supabaseClient.auth.getUser();
            const source = '';
            // Get geolocation
            let latitude = null;
            let longitude = null;

            try {
                const position = await new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(resolve, reject, {
                        timeout: 5000
                    });
                });
                latitude = position.coords.latitude;
                longitude = position.coords.longitude;
            } catch (geoError) {
                console.log('Geolocation unavailable:', geoError);
            }

            const response = await fetch('/api/inspire', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    content: content,
                    source: source || '',
                    userId: user.id,
                    latitude: latitude,
                    longitude: longitude
                })
            });

            const result = await response.json();

            if (result.success) {
                const locationText = result.location ? ` · ${result.location}` : '';
                const categoryText = result.category ? ` · ${result.category}` : '';
                document.getElementById('inspiration-status').innerText = 
                    `Captured${categoryText}${locationText}`;
            document.getElementById('inspiration-content').value = '';    
            } else {
                document.getElementById('inspiration-status').innerText = 'Error capturing inspiration.';
            }

            btn.disabled = false;
        }

let selectedTools = [];
        let currentToolLogIds = [];

        async function buildToolboxButtons() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            
            const { data: tools } = await supabaseClient
                .from('tool_index')
                .select('name, category')
                .eq('user_id', user.id)
                .order('name');

            // Also get tools with no user_id set yet
            const { data: unassignedTools } = await supabaseClient
                .from('tool_index')
                .select('name, category')
                .is('user_id', null)
                .order('name');

            const allTools = [...(tools || []), ...(unassignedTools || [])];

            const hour = new Date().getHours();
            let timeOfDay = '';
            let timeLabel = '';
            if (hour >= 5 && hour < 12) { timeOfDay = 'morning'; timeLabel = 'Morning Tools'; }
            else if (hour >= 12 && hour < 17) { timeOfDay = 'afternoon'; timeLabel = 'Afternoon Tools'; }
            else if (hour >= 17 && hour < 21) { timeOfDay = 'evening'; timeLabel = 'Evening Tools'; }
            else { timeOfDay = 'night'; timeLabel = 'Night Tools'; }

            document.getElementById('toolbox-time-label').innerText = timeLabel;

            const timeKeywords = {
                morning: ['morning', 'dhikr', 'hydration', 'mobility', 'brooklyn', 'jazz', 'coffee', 'prayer', 'grooming', 'fashion', 'cold air', 'cuddling', 'drop it', 'journaling'],
                afternoon: ['afternoon', 'midday', 'sun', 'nap', 'mobility', 'prayer', 'lofi', 'journaling', 'building', 'learning', 'hydration', 'drop it', 'relieving'],
                evening: ['evening', 'brooklyn', 'prayer', 'journaling', 'lofi', 'hydration', 'bedtime', 'drop it', 'selective'],
                night: ['bedtime', 'evening', 'prayer', 'breathing', 'drop it']
            };

            const keywords = timeKeywords[timeOfDay] || [];

            const filtered = allTools.filter(t => {
                const nameLower = t.name.toLowerCase();
                return keywords.some(k => nameLower.includes(k)) || 
                       !['morning', 'afternoon', 'midday', 'evening', 'bedtime'].some(k => nameLower.includes(k));
            });

            const stabilizers = filtered.filter(t => t.category === 'Stabilizer');
            const regulators = filtered.filter(t => t.category === 'Regulator');
            const expanders = filtered.filter(t => t.category === 'Expander');

            buildCategoryButtons('stabilizer-buttons', stabilizers);
            buildCategoryButtons('regulator-buttons', regulators);
            buildCategoryButtons('expander-buttons', expanders);
        }

        function buildCategoryButtons(containerId, tools) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            tools.forEach(tool => {
                const btn = document.createElement('button');
                btn.innerText = tool.name;
                btn.style.background = '#f5f5f0';
                btn.style.color = '#555';
                btn.style.border = '1px solid #ddd';
                btn.style.padding = '6px 12px';
                btn.style.fontSize = '0.8rem';
                btn.style.cursor = 'pointer';
                btn.style.marginTop = '0';
                btn.id = `tool-btn-${tool.name.replace(/\s+/g, '-').replace(/[^a-zA-Z0-9-]/g, '')}`;
                btn.onclick = () => selectTool(tool.name);
                container.appendChild(btn);
            });
        }

        function selectTool(name) {
            const btnId = `tool-btn-${name.replace(/\s+/g, '-').replace(/[^a-zA-Z0-9-]/g, '')}`;
            const btn = document.getElementById(btnId);
            if (selectedTools.includes(name)) {
                selectedTools = selectedTools.filter(t => t !== name);
                if (btn) { btn.style.background = '#f5f5f0'; btn.style.color = '#555'; }
            } else {
                selectedTools.push(name);
                if (btn) { btn.style.background = '#2c2c2c'; btn.style.color = '#fff'; }
            }
            document.getElementById('toolbox-status').innerText = 
                selectedTools.length > 0 ? `${selectedTools.length} tool${selectedTools.length > 1 ? 's' : ''} selected` : '';
        }

        async function logToolStack() {
            if (selectedTools.length === 0) {
                document.getElementById('toolbox-status').innerText = 'Select at least one tool.';
                return;
            }

            const btn = document.getElementById('toolbox-btn');
            if (btn.disabled) return;
            btn.disabled = true;

            document.getElementById('toolbox-status').innerText = 'Logging stack...';
            document.getElementById('toolbox-summary').innerText = '';
            document.getElementById('toolbox-feedback-section').style.display = 'none';

            const { data: { user } } = await supabaseClient.auth.getUser();
            const note = document.getElementById('toolbox-note').value;

            let latitude = null;
            let longitude = null;
            try {
                const position = await new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 5000 });
                });
                latitude = position.coords.latitude;
                longitude = position.coords.longitude;
            } catch (geoError) {
                console.log('Geolocation unavailable:', geoError);
            }

            const response = await fetch('/api/toolbox', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    toolNames: selectedTools,
                    note: note || '',
                    userId: user.id,
                    latitude: latitude,
                    longitude: longitude
                })
            });

            const result = await response.json();

            if (result.success) {
                const locationText = result.location ? ` · ${result.location}` : '';
                document.getElementById('toolbox-status').innerText = 
                    `${result.toolCount} tool${result.toolCount > 1 ? 's' : ''} logged · ${result.timeOfDay}${locationText}`;
                
                if (result.stackSummary) {
                    document.getElementById('toolbox-summary').innerText = result.stackSummary;
                    document.getElementById('toolbox-feedback-section').style.display = 'block';
                }

                // Store log IDs for feedback
                const { data: recentLogs } = await supabaseClient
                    .from('tool_log')
                    .select('id')
                    .eq('user_id', user.id)
                    .order('created_at', { ascending: false })
                    .limit(selectedTools.length);
                
                currentToolLogIds = recentLogs ? recentLogs.map(l => l.id) : [];

                // Reset selections
                selectedTools.forEach(name => {
                    const btnId = `tool-btn-${name.replace(/\s+/g, '-').replace(/[^a-zA-Z0-9-]/g, '')}`;
                    const toolBtn = document.getElementById(btnId);
                    if (toolBtn) { toolBtn.style.background = '#f5f5f0'; toolBtn.style.color = '#555'; }
                });
                selectedTools = [];
                document.getElementById('toolbox-note').value = '';

            } else {
                document.getElementById('toolbox-status').innerText = 'Error logging stack.';
            }

            btn.disabled = false;
        }

        async function saveToolFeedback() {
            const feedback = document.getElementById('toolbox-feedback').value;
            if (!feedback.trim()) return;

            const feedbackBtn = document.getElementById('feedback-btn');
            feedbackBtn.disabled = true;

            if (currentToolLogIds.length > 0) {
                await Promise.all(currentToolLogIds.map(id => 
                    supabaseClient
                        .from('tool_log')
                        .update({ user_feedback: feedback })
                        .eq('id', id)
                ));
            }

            document.getElementById('feedback-status').innerText = 'Note saved.';
            document.getElementById('toolbox-feedback').value = '';
            feedbackBtn.disabled = false;
        }

       // Initialize mood, feelings, and toolbox UI on load
        buildMoodButtons();
        buildFeelingsGrid();
        buildToolboxButtons();



        async function generatePrompt() {
            document.getElementById('prompt-btn').innerText = 'Generating...';
            document.getElementById('prompt-display').innerText = '';

            const { data: { user } } = await supabaseClient.auth.getUser();

        const feelingsNote = document.getElementById('feelings-note').value;

            const response = await fetch('/api/prompt', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    userId: user.id,
                    currentMood: selectedMood,
                    currentFeelings: selectedFeelings,
                    feelingsNote: feelingsNote || ''
                })
            });  

            const { prompt, rowId } = await response.json();

            currentRowId = rowId;
            promptWasUsed = false;

            document.getElementById('prompt-display').innerText = prompt;
            document.getElementById('prompt-btn').innerText = 'Generate Prompt';
            document.getElementById('entry').addEventListener('input', function() {
                promptWasUsed = true;
            }, { once: true });
        }

        async function submitEntry() {
            const entry = document.getElementById('entry').value;
            if (!entry.trim()) return;

            document.getElementById('reflection').innerText = 'Reflecting...';

            const { data: { user } } = await supabaseClient.auth.getUser();

            const { data: recentEntries } = await supabaseClient
                .from('entries')
                .select('entry, reflection')
                .eq('user_id', user.id)
                .order('created_at', { ascending: false })
                .limit(5);

            const { count } = await supabaseClient
                .from('entries')
                .select('*', { count: 'exact', head: true })
                .eq('user_id', user.id);

            const response = await fetch('/api/reflect', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    entry: entry,
                    recentEntries: recentEntries || [],
                    userId: user.id,
                    totalEntryCount: count || 0,
                    rowId: currentRowId,
                    promptUsed: promptWasUsed
                })
            });

           const { reflection, sessionRowId } = await response.json();

            document.getElementById('reflection').innerText = reflection;
            currentRowId = sessionRowId || currentRowId;
            promptWasUsed = false;
            buildMoodPostButtons();
    
        }
    </script>

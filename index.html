<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mirror</title>
    <style>
        body {
            font-family: Georgia, serif;
            max-width: 640px;
            margin: 60px auto;
            padding: 0 20px;
            background: #faf9f7;
            color: #2c2c2c;
        }
        h1 {
            font-size: 1.4rem;
            font-weight: normal;
            margin-bottom: 40px;
            color: #555;
        }
        textarea {
            width: 100%;
            height: 300px;
            border: 1px solid #ddd;
            padding: 16px;
            font-family: Georgia, serif;
            font-size: 1rem;
            line-height: 1.7;
            background: #fff;
            resize: vertical;
            box-sizing: border-box;
        }
        button {
            margin-top: 16px;
            padding: 10px 24px;
            background: #2c2c2c;
            color: #fff;
            border: none;
            font-size: 0.9rem;
            cursor: pointer;
        }
        #reflection {
            margin-top: 40px;
            line-height: 1.8;
            color: #444;
        }
    </style>
</head>
<body>
    <h1>Mirror</h1>
    <textarea id="entry" placeholder="Write here..."></textarea>
    <button onclick="submitEntry()">Submit</button>
    <div id="reflection"></div>

    <script>
        function submitEntry() {
            const entry = document.getElementById('entry').value;
            if (!entry.trim()) return;
            document.getElementById('reflection').innerText = 'Entry received.';
        }
    </script>
</body>
</html>
